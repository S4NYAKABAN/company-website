mkdir -p .github/workflows
name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Install, migrate and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations
        run: python manage.py migrate
        env:
          DJANGO_SETTINGS_MODULE: core.settings
          DEBUG: "1"

      - name: Run tests
        run: pytest --tb=short
        env:
          DJANGO_SETTINGS_MODULE: core.settings
          DEBUG: "1"

  docker:
    name: Build and smoke-test Docker image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t company-web:latest .

      - name: Run container and smoke test
        run: |
          docker run -d --name web -p 8000:8000 \
            -e DJANGO_SETTINGS_MODULE=core.settings \
            -e DEBUG=1 \
            company-web:latest
          sleep 5
          curl --fail http://localhost:8000 || exit 1
          docker stop web
          docker rm web
